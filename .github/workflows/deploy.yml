name: deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE_PATH: /ouroboros
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
      PROJECT_ID: ${{ vars.TESTSPRITE_PROJECT_ID }}
    steps:
      - name: wait until Vercel serves this exact commit
        run: |
          for i in $(seq 1 40); do
            if curl -s https://ouroboros-phi.vercel.app/ | grep -q "data-commit=\"$GITHUB_SHA\""; then
              echo "fresh deploy confirmed: $GITHUB_SHA"; exit 0
            fi
            sleep 15
          done
          echo "Vercel never served $GITHUB_SHA — refusing to verify a stale deploy"; exit 1
      - run: npm i -g @testsprite/testsprite-cli
      - run: testsprite test rerun --all --project "$PROJECT_ID" --wait --timeout 1500 --output json
